<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Custom CSS for theme adaptation and high contrast in browser tabs -->
  <style>
    .brand-stroke {
      fill: none;
      stroke: #8b5cf6; /* Indigo/Purple matching the portfolio main theme */
      stroke-width: 38;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .arrow-stroke {
      fill: none;
      stroke: #10b981; /* Emerald green representing database RLS, queries and queue systems */
      stroke-width: 38;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @media (prefers-color-scheme: dark) {
      .brand-stroke {
        stroke: #c084fc; /* Bright Violet/Purple for dark browser tabs */
      }
      .arrow-stroke {
        stroke: #34d399; /* Bright Minty Emerald for dark browser tabs */
      }
    }
  </style>
  
  <!-- Database Stack (Vertical Stem: 3 distinct capsules) -->
  <path class="brand-stroke" d="M 200 120 L 200 180" />
  <path class="brand-stroke" d="M 200 220 L 200 280" />
  <path class="brand-stroke" d="M 200 320 L 200 380" />
  
  <!-- Cache Loop (Redis semicircular buffer) -->
  <path class="brand-stroke" d="M 200 120 C 300 120, 300 280, 200 280" />
  
  <!-- Queue & Data Pipeline (Diagonal exit flow leg) -->
  <path class="arrow-stroke" d="M 200 280 L 310 390" />
  
  <!-- Queue Direction Arrowhead -->
  <path class="arrow-stroke" d="M 260 390 L 310 390 L 310 340" />
</svg>
